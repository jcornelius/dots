<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {% seo %}
  <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- ── Skip Link ───────────────────────────────────────────── -->
<a href="#main-content" class="skip-link">Skip to main content</a>

<!-- ── Navbar ───────────────────────────────────────────────── -->
<nav class="navbar" aria-label="Main navigation">
  <div class="navbar-inner">
    <a href="/" class="navbar-brand">Sticks & Steaks</a>
    <div class="navbar-links" role="list">
      <a href="/dots/" class="navbar-link" role="listitem" {% if page.url == '/dots/' %}aria-current="page"{% endif %}>Dots</a>
      <a href="/birdies/" class="navbar-link" role="listitem" {% if page.url == '/birdies/' %}aria-current="page"{% endif %}>Birdies</a>
      <a href="/play/" class="navbar-link" role="listitem" {% if page.url == '/play/' %}aria-current="page"{% endif %}>Play</a>
    </div>
  </div>
</nav>

<main id="main-content">
  {{ content }}
</main>

  <footer class="site-footer" role="contentinfo">
    <div class="footer-inner">
      <p class="footer-title">Sticks &amp; Steaks</p>
      <p class="footer-tagline">don't threaten us with a good time</p>
      <p class="footer-copyright">&copy; {{ 'now' | date: "%Y" }} Sticks &amp; Steaks. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
