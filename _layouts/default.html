<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- ── Navbar ───────────────────────────────────────────────── -->
<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="navbar-brand">Sticks & Steaks</a>
    <div class="navbar-links">
      <a href="/dots/" class="navbar-link{% if page.url == '/dots/' %} navbar-link--active{% endif %}">Dots</a>
      <a href="/birdies/" class="navbar-link{% if page.url == '/birdies/' %} navbar-link--active{% endif %}">Birdies</a>
      <a href="/play/" class="navbar-link{% if page.url == '/play/' %} navbar-link--active{% endif %}">Play</a>
    </div>
  </div>
</nav>


  {{ content }}

  <footer class="site-footer">
    <div class="footer-inner">
      <p class="footer-title">Sticks &amp; Steaks</p>
      <p class="footer-tagline">don't threaten us with a good time</p>
      <p class="footer-copyright">&copy; {{ 'now' | date: "%Y" }} Sticks &amp; Steaks. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
